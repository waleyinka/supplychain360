name: SupplyChain360-CI-CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "dev" ]

jobs:

  # ---------------------------------------------------------
  # 1. PYTHON INGESTION VALIDATION (CI)
  # ---------------------------------------------------------
  ingestion-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r airflow/ingestion/requirements.txt

      - name: Lint Python Scripts
        run: |
          pip install flake8
          flake8 airflow/ingestion --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Unit Tests (if any)
        run: |
          if [ -d "tests" ]; then pytest -q; else echo "No tests folder found"; fi


  # ---------------------------------------------------------
  # 2. SNOWFLAKE + DBT VALIDATION (CI)
  # ---------------------------------------------------------
  dbt-validation:
    needs: ingestion-validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install dbt-core dbt-snowflake

      - name: Create dbt Profile
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          supplychain360:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: ${{ secrets.DBT_ACCOUNT }}
                user: ${{ secrets.DBT_USER }}
                password: ${{ secrets.DBT_PASSWORD }}
                role: ${{ secrets.DBT_ROLE }}
                database: ${{ secrets.DBT_DATABASE }}
                warehouse: ${{ secrets.DBT_WAREHOUSE }}
                schema: ${{ secrets.DBT_SCHEMA }}
                threads: 4
          EOF

      - name: Install dbt Packages
        working-directory: ./airflow/dbt/supplychain360_dbt
        run: dbt deps

      - name: dbt Debug
        working-directory: ./airflow/dbt/supplychain360_dbt
        run: dbt debug --target prod

      - name: dbt Build (Full Transform)
        working-directory: ./airflow/dbt/supplychain360_dbt
        run: dbt build --target prod


  # ---------------------------------------------------------
  # 3. DOCKER BUILD & PUSH (CD)
  # ---------------------------------------------------------
  docker-deploy:
    needs: dbt-validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/supplychain360:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/supplychain360:${{ github.sha }}


  # ---------------------------------------------------------
  # 4. EMAIL NOTIFICATION
  # ---------------------------------------------------------
  send-notification:
    needs: [ingestion-validation, dbt-validation, docker-deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "SupplyChain360 CI/CD Status: ${{ job.status }}"
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: "GitHub Actions - SupplyChain360"
          body: |
            The SupplyChain360 pipeline has finished.

            Status: ${{ job.status }}
            Commit: ${{ github.sha }}
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
